openapi: 3.1.0
info:
  title: Pipeline Labs SDK API
  version: 1.0.0
  description: |
    Curated SDK surface for Stainless. This spec is intentionally limited to the
    most relevant programmatic routes for dataset ingestion, AI processing, job
    tracking, downloads, chat, auth verification, billing, and health.

servers:
  - url: https://pipeline-labs.vercel.app
    description: Production

security:
  - bearerAuth: []
  - apiKeyAuth: []

tags:
  - name: Auth
  - name: Upload
  - name: Datasets
  - name: Processing
  - name: Chat
  - name: Billing
  - name: Health

paths:
  /api/auth/verify-key:
    get:
      operationId: verifyApiKey
      tags: [Auth]
      summary: Verify a generated user API key
      security:
        - apiKeyAuth: []
      responses:
        '200':
          description: API key is valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyApiKeyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/upload:
    post:
      operationId: uploadDataset
      tags: [Upload]
      summary: Upload or finalize a dataset
      description: |
        Single upload endpoint supporting:
        - simple multipart upload
        - chunked upload init
        - chunk upload
        - chunked upload finalize
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                name:
                  type: string
                sessionId:
                  type: string
                chunkIndex:
                  type: integer
                totalChunks:
                  type: integer
                chunk:
                  type: string
                  format: binary
                filename:
                  type: string
                fileType:
                  type: string
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ChunkInitRequest'
                - $ref: '#/components/schemas/ChunkFinalizeRequest'
      responses:
        '200':
          description: Upload result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/upload/chunk:
    post:
      operationId: uploadDatasetChunk
      tags: [Upload]
      summary: Compatibility alias for chunked uploads
      description: Thin compatibility route that forwards to `/api/upload`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
                chunkIndex:
                  type: integer
                totalChunks:
                  type: integer
                chunk:
                  type: string
                  format: binary
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ChunkInitRequest'
                - $ref: '#/components/schemas/ChunkFinalizeRequest'
      responses:
        '200':
          description: Upload result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'

  /api/datasets:
    get:
      operationId: listDatasets
      tags: [Datasets]
      summary: List datasets
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 10, maximum: 100 }
        - in: query
          name: status
          schema: { type: string }
      responses:
        '200':
          description: Paginated datasets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetListResponse'
    delete:
      operationId: deleteDataset
      tags: [Datasets]
      summary: Soft-delete a dataset
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Dataset deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /api/datasets/{id}/preview:
    get:
      operationId: previewDataset
      tags: [Datasets]
      summary: Preview dataset rows and columns
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: rows
          schema: { type: integer, default: 10, maximum: 100 }
      responses:
        '200':
          description: Dataset preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetPreview'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/datasets/{id}/download:
    get:
      operationId: downloadDataset
      tags: [Datasets]
      summary: Download a source or processed dataset
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: format
          schema:
            type: string
            enum: [csv, json, xlsx]
            default: csv
        - in: query
          name: processed
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: File stream

  /api/process:
    post:
      operationId: createProcessingJob
      tags: [Processing]
      summary: Create a chunked AI dataset processing job
      description: |
        Generates a chunked cleaning plan, processes dataset chunks with AI,
        validates output against the original schema, stores the cleaned dataset,
        and returns a processing summary plus download URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessRequest'
      responses:
        '200':
          description: Processing completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      operationId: getProcessingJob
      tags: [Processing]
      summary: Get processing job status
      parameters:
        - in: query
          name: jobId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Processing job state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingJob'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/chat:
    post:
      operationId: createChatCompletion
      tags: [Chat]
      summary: Send a message to the Pipeline Labs assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Assistant response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
    get:
      operationId: listChatAgents
      tags: [Chat]
      summary: List available assistant agents
      responses:
        '200':
          description: Agent catalog

  /api/billing/subscription:
    get:
      operationId: getSubscription
      tags: [Billing]
      summary: Get subscription details
      responses:
        '200':
          description: Subscription information

  /api/billing/usage:
    get:
      operationId: getUsage
      tags: [Billing]
      summary: Get current usage
      responses:
        '200':
          description: Usage information

  /api/health:
    get:
      operationId: getHealth
      tags: [Health]
      summary: Health check
      security: []
      responses:
        '200':
          description: Service status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    ChunkInitRequest:
      type: object
      required: [action, filename, fileSize, fileType, totalChunks]
      properties:
        action: { type: string, enum: [init] }
        filename: { type: string }
        fileSize: { type: integer }
        fileType: { type: string, enum: [csv, xlsx, xls, json] }
        totalChunks: { type: integer }

    ChunkFinalizeRequest:
      type: object
      required: [action, sessionId]
      properties:
        action: { type: string, enum: [finalize] }
        sessionId: { type: string }

    UploadResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        path: { type: string }
        publicUrl: { type: string, format: uri }
        name: { type: string }
        size: { type: integer }
        type: { type: string }
        rowCount: { type: integer }
        columnCount: { type: integer }
        createdAt: { type: string, format: date-time }
        sessionId: { type: string }
        chunkSize: { type: integer }
        totalChunks: { type: integer }

    Dataset:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        original_filename: { type: string }
        file_type: { type: string }
        file_size_bytes: { type: integer }
        row_count: { type: integer }
        column_count: { type: integer }
        status: { type: string }
        storage_url:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time

    DatasetListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Dataset'
        pagination:
          type: object
          properties:
            page: { type: integer }
            limit: { type: integer }
            total: { type: integer }
            totalPages: { type: integer }

    DatasetPreview:
      type: object
      properties:
        columns:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              type: { type: string }
              sample:
                type: array
                items: { type: string }
        rows:
          type: array
          items:
            type: object
        totalRows: { type: integer }
        totalColumns: { type: integer }

    ProcessRequest:
      type: object
      required: [datasetId, prompt]
      properties:
        datasetId: { type: string, format: uuid }
        prompt: { type: string, maxLength: 4000 }
        options:
          type: object
          properties:
            outputFormat:
              type: string
              enum: [csv, json]
              default: csv

    ProcessResponse:
      type: object
      properties:
        jobId: { type: string, format: uuid }
        datasetId: { type: string, format: uuid }
        processedDatasetId: { type: string, format: uuid }
        status: { type: string, enum: [completed] }
        downloadUrl: { type: string, format: uri }
        previewUrl: { type: string }
        summary:
          type: object
          properties:
            originalRows: { type: integer }
            originalColumns: { type: integer }
            processedRows: { type: integer }
            processedColumns: { type: integer }
            operationsApplied:
              type: array
              items: { type: string }
            llmInstructions: { type: string }
            processingDurationMs: { type: integer }
            chunkCount: { type: integer }
            chunkSize: { type: integer }

    ProcessingJob:
      type: object
      properties:
        jobId: { type: string, format: uuid }
        datasetId: { type: string, format: uuid }
        processedDatasetId:
          type: string
          format: uuid
          nullable: true
        status: { type: string }
        currentStep: { type: integer }
        totalSteps: { type: integer }
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        downloadUrl:
          type: string
          format: uri
          nullable: true
        previewData:
          type: object
          nullable: true
        plan:
          type: object
          nullable: true
        progressMessages:
          type: array
          items:
            type: object
        error:
          type: string
          nullable: true

    ChatRequest:
      type: object
      required: [message]
      properties:
        message: { type: string }
        datasetId:
          type: string
          format: uuid
          nullable: true
        provider:
          type: string
          enum: [groq, openrouter, deepseek, gemini]
        model:
          type: string
          nullable: true

    ChatResponse:
      type: object
      properties:
        content: { type: string }
        agent: { type: string }
        provider: { type: string }
        model: { type: string }

    VerifyApiKeyResponse:
      type: object
      properties:
        valid: { type: boolean }
        authType: { type: string, enum: [api_key] }
        profile:
          type: object
          nullable: true
        apiKey:
          type: object
          nullable: true

    HealthResponse:
      type: object
      properties:
        status: { type: string }
        timestamp:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
